<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HQ Trainer | Industriemeister Metall</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Industriemeister Metall · HQ</p>
        <h1>Prüfungstrainer</h1>
        <p class="subtitle">
          Trainiere Technik, Organisation sowie Führung &amp; Personal.
        </p>
      </div>

      <button id="reset-button" class="button button-secondary" type="button">
        Training zurücksetzen
      </button>
    </header>

    <section class="progress-card" aria-label="Trainingsfortschritt">
      <div class="progress-head">
        <div>
          <p class="section-label">Gesamtfortschritt</p>
          <strong id="total-progress-text">0 von 0 beantwortet</strong>
        </div>
        <strong id="total-progress-percent">0 %</strong>
      </div>

      <div class="progress-track" aria-hidden="true">
        <div id="total-progress-bar" class="progress-fill"></div>
      </div>

      <div id="area-progress" class="area-progress"></div>
    </section>

    <section class="filter-card" aria-label="Prüfungsbereich auswählen">
      <div class="filter-head">
        <div>
          <p class="section-label">Prüfungsbereich</p>
          <h2>Fragen filtern</h2>
        </div>
      </div>

      <div id="area-filters" class="filter-buttons"></div>
    </section>

    <section id="quiz-card" class="quiz-card" aria-live="polite"></section>
  </main>

  <script src="questions.js"></script>
  <script src="fachgespraech.js"></script>
  <script src="app.js"></script>
</body>
</html>
