<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – AT Learning</title>
<link rel="icon" href="favicon.ico"><link rel="stylesheet" href="style.css">
</head>
<body>
<section class="admin-login-wrap">
  <div class="admin-login-box">
    <img src="logo.png" alt="AT Learning" class="admin-logo">
    <h1>Anmeldung</h1>
    <p class="admin-sub">Mit Ihrer E-Mail-Adresse und Ihrem Passwort anmelden.</p>
    <form id="loginForm">
      <input type="email" id="loginEmail" placeholder="E-Mail-Adresse" required autocomplete="username">
      <input type="password" id="loginPassword" placeholder="Passwort" required autocomplete="current-password">
      <button type="submit" class="btn btn-primary">Anmelden</button>
      <p class="form-note" id="loginNote"></p>
    </form>
    <a href="index.html" class="back-link">← Zurück zur Website</a>
  </div>
</section>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="login.js"></script>
</body></html>
