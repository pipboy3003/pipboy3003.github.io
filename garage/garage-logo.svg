<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 50">
  <!-- Hintergrund ist bewusst transparent: kein <rect> mit fill -->

  <!-- Rolltor-Rahmen -->
  <rect x="6" y="6" width="80" height="38" rx="8"
        fill="none"
        stroke="#fb923c"
        stroke-width="3"/>

  <!-- Tor-Lamellen -->
  <rect x="12" y="12" width="68" height="6" rx="3" fill="#0b1120"/>
  <rect x="12" y="20" width="68" height="6" rx="3" fill="#0b1120"/>
  <rect x="12" y="28" width="68" height="6" rx="3" fill="#0b1120"/>
  <rect x="12" y="36" width="68" height="4" rx="2" fill="#0b1120"/>

  <!-- Unterkante / Schwelle -->
  <rect x="10" y="40" width="72" height="3" rx="1.5" fill="#fb923c"/>

  <!-- Schriftzug GarageCTRL -->
  <text x="100" y="28"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18"
        fill="#e5e7eb"
        font-weight="600">
    GarageCTRL
  </text>
</svg>
