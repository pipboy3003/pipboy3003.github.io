<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maus-Sammler 3D</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐭</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap" rel="stylesheet">
    
    <script>
        const css = document.createElement('link');
        css.rel = 'stylesheet';
        css.href = 'style.css?v=' + Date.now();
        document.head.appendChild(css);
    </script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="vignette"></div>

    <div id="startOverlay">
        <h1 class="pulse-text">Tippe, um zu starten!</h1>
    </div>

    <div id="ui-container" style="display: none;">
        <h1>Maus-Sammler 3D</h1>
        <p>Level: <span id="level">1</span></p>
        <p>Käse: <span id="score">0</span></p>
        
        <div id="weight-container">
            <p style="font-size: 18px; margin: 10px 0 5px 0;">Gewicht:</p>
            <div id="weight-bar-bg">
                <div id="weight-bar-fill"></div>
            </div>
        </div>
    </div>
    
    <div id="touch-hint" style="display: none;">
        Bildschirmhälfte gedrückt halten zum Steuern
    </div>

    <div id="gameOverOverlay" style="display: none;">
        <h1 class="snap-title">ZUGESCHNAPPT!</h1>
        <p>Du hast <span id="finalScore">0</span> Stück Käse verdrückt.</p>
        <button id="restartBtn">Erneut versuchen</button>
    </div>

    <script>
        const js = document.createElement('script');
        js.src = 'script.js?v=' + Date.now();
        document.body.appendChild(js);
    </script>
</body>
</html>
