<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D WebGL Racer</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>">
    
    <script>
        document.write('<link rel="stylesheet" href="style.css?v=' + Date.now() + '">');
    </script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="ui-container">
        <h1>3D Racer</h1>
        <p>Score: <span id="score">0</span></p>
        <button id="restartBtn" style="display:none;">Neustart</button>
    </div>
    
    <div id="touch-hint" style="display: none;">
        Tippe auf die linke oder rechte Bildschirmhälfte zum Steuern
    </div>

    <script>
        document.write('<script src="script.js?v=' + Date.now() + '"><\/script>');
    </script>
</body>
</html>
